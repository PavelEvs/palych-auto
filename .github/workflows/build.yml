name: Build Palych APK
on: [push] # Сборка начнется сразу после сохранения

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet[all] flet-audio openai edge-tts SpeechRecognition

      - name: Build APK
        run: |
          # Добавляем флаги, чтобы сборщик не задавал вопросов
          flet build apk --yes --no-interactive

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: palych-app
          path: build/apk/*.apk # Путь, где будет лежать готовый файл
