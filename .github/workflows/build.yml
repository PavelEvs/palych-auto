name: Build Palych APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev mesa-utils

      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Flet and Python Dependencies
        run: |
          # Свежие версии без привязки к цифрам
          pip install flet flet-audio openai edge-tts
          pip install -r requirements.txt

      - name: Build APK
        env:
          # Сообщаем сборщику, что мы робот, и задавать вопросы нельзя
          CI: true 
        run: |
          # Принудительно отправляем "Да" (y) на любые скрытые вопросы
          yes | flet build apk --module-name app --verbose
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: palych-app
          path: build/apk/*.apk
